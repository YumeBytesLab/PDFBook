name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild the site when docs-related files change — release tags and
    # binary uploads to this repo shouldn't trigger a site deploy.
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Permissions the deploy-pages action needs to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
